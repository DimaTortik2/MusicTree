<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#0f0510" />
    <title>MusicTree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
		<link rel="icon" type="image/png" href="/favicon-96x96.png?v=20260529" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260529" />
		<link rel="shortcut icon" href="/favicon.ico?v=20260529" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260529" />
		<link rel="manifest" href="/site.webmanifest?v=20260529" />
		<!-- SEO -->
		<meta property="og:type" content="website" />
    <meta property="og:url" content="https://musictree.app/" />
    <meta property="og:title" content="MusicTree — Твой интерактивный вокальный тренер" />
    <meta property="og:description" content="Пройди интерактивный путь от новичка до уверенного вокалиста. Уроки, домашние задания, вокальный тренажер и умная система прогресса." />
    <meta property="og:image" content="https://musictree.app/og-image.png" />
    <meta property="og:site_name" content="MusicTree" />
		
    <style>
			body {
				margin: 0;
				padding: 0;
				background-color: #212121;
			}
			.perspective-container {
				perspective: 800px;
			}
			.circle-loader {
				transform-origin: center;
				animation: rotate-coin 3s linear infinite;
				will-change: transform;
			}
			@keyframes rotate-coin {
				0% {
					transform: rotateX(0deg) rotateY(0deg);
				}
				45% {
					transform: rotateX(70deg) rotateY(50deg);
				}
				50%,
				52% {
					transform: rotateX(75deg) rotateY(55deg);
				}
				100% {
					transform: rotateX(0deg) rotateY(0deg);
				}
			}
			.full-page-wrapper {
				width: 100vw;
				height: 100vh;
				height: 100dvh;
				background-color: #0f0510;

				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
			}
			.loader-container {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
			}
			.loader-container svg {
				width: calc((1vh + 1vw) * 15);
				height: calc((1vh + 1vw) * 15);
				color: #db2777;
			}
			
		</style>
  </head>
  <body>
    <div id="root">
      <div class="full-page-wrapper perspective-container">
			<div class="loader-container">
				<svg viewBox="0 0 200 200" stroke="currentColor">
					<circle
						cx="100"
						cy="100"
						r="80"
						fill="none"
						stroke-width="4"
						class="circle-loader"
					/>
				</svg>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
